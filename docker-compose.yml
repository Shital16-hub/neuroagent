version: "3.9"

# NeuroAgent — Local Development Services
# Run with: docker-compose up -d
#
# MongoDB  → MongoDB Atlas (cloud, free tier) — not run locally
# Neo4j    → Neo4j AuraDB (cloud, free tier) — not run locally
# Qdrant   → runs locally (no fully-free cloud tier with persistent storage)

services:

  # ── Qdrant Vector Database (local) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: neuroagent_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
    driver: local
